body:
  text: 女科第一千金寶要列婦人門於第一殆易始乾坤詩首關睢之義也茲仿其例帶下帶下女子生而即有津津常潤天賦之恆或至太多是病也然古以婦人隱疾統名帶下今人但知白帶赤帶等名耳病因非止一端屬陰虛者六味地黃丸每晨淡鹽湯送服三錢怯弱人多陰虛肥白者多濕堅瘦者多火屬濕盛者松石豬肚丸每早淡豆腐漿送服三錢火盛者黃柏烏賊骨等分研末女貞子煎濃汁法丸緑豆大砂仁一錢研末泡湯早晨送服三錢旱蓮草野苧麻根各四兩十大功勞一兩酒水各半煎服如治血崩加木耳炭一錢五分血餘一錢共研細末調入服調經人參甘草桑寄生酒炒丹參各二兩制白朮八兩黃芩當歸各六兩牡蠣煅飛杜仲鹽水炒茯苓菟絲餅枳殼白芍各四兩川芎澤瀉各三兩十五味為末煉蜜丸每重錢半以一丸空心開水調服治氣虛血少經事不調赤白帶下腰痠胎滑或不受孕皆效一方去丹參人參加西洋參制香附陳艾醋炒炭各一兩尤為保胎要藥凡胎氣易滑者每交三五七月頻服之甚效或不用蜜丸每服散藥一錢二分開水下亦可並治胎前惡阻亦驗秦氏養胎法妊娠二月氣血不足胎氣始盛逆動胃氣惡阻嘔吐不食半夏湯主之半夏制橘紅鹽水炒茯苓各一錢酒芩麩炒枳殼紫蘇各八分炙甘草五分生薑一薄片煎服野云氏曰腹中臟腑各有定位受孕則多了一日長夜大之活物臟腑覺其逼仄而不安氣血為之窒礙而不調不但痰飲漸生甚或不能客谷病名惡阻以其嘔惡而阻納也治以通氣化痰固為扼要若脾氣素弱者用繆氏資生丸培運兼施更為妥妙此丸兼治大人小兒胃強能食脾虛少運飢飽失時致生諸證及病後老年膏粱安逸氣機窒滯思慮傷脾等恙神妙不可殫述在善用者神明其意耳抑青丸三月前十日服川連三兩薑汁炒三次為末米糊丸緑豆大每三四分或七八分煎前方半夏湯送服和氣飲四月倦臥不安或口舌頭痛腳弱及腫者白朮土炒一錢五分鹽橘紅一錢鹽香附二錢研茯苓八分炒白芍酒芩各一錢川芎炙草各五分酒歸身一錢六分煎服熱多加梔炭一錢如無恙可勿服按各月皆然不僅此方也汪謝城曰妊娠無疾不宜服藥丸無故服藥名曰保胎適使墮胎富貴之家雖勸停藥必不肯信真庸人自擾也蓋無病不必服藥凡人皆然豈獨妊娠哉養胎飲五月胎長腹重睡臥不安者酒洗歸身酒芍鹽澤瀉各一錢土炒白朮一錢五分酒芩麩枳殼川芎各八分炙草四分煎服二劑如勝飲六月胎氣不和或腹痛胎動不安歸身二錢焦白朮一錢五分酒芩酒芍炒砂仁茯苓酒蒸續斷各一錢炙草五分煎服六日進一劑萬全飲七月腹大重墜者阿膠熟地酒芍酒芩各一錢酒蒸續斷土炒歸身川芎各一錢五分炒茯苓炒荊芥各八分炙草五分煎服二劑調氣飲八月喘腫不拘有無外感皆治炒橘皮二錢酒芩一錢五分土炒茯苓焦白朮各一錢麩枳殼八分炙草三分煎服二劑七日再服順胎飲九月雖無病宜順氣和中使無難産歸身二錢焦白朮一錢五分酒芩滑石末酒蘇梗酒芍酒洗腹皮各八分煎服二劑八日進一劑滑胎飲臨月服一三日進一劑娩而止茯苓歸身各一錢五分焦白朮煨川芎制香附廣皮各二錢蘇梗八分酒芩五分炙草五分煎服氣虛加人參一錢胎肥加麩枳殼一錢五分按素患墮胎及難産者逐月按方服之可保無虞孕婦心腹痛甚鹽少許炒赤取一撮淬酒服立止胎氣上頂好醬油如常瀹湯飲即安日月未足欲産全蛇蛻一條絹囊之繞繫腰間保産催生大黃酒蒸益母草酒醋薑炒艾另研酒醋薑炒生地酒蒸各二兩莪朮醋炒赤芍延胡醋薑酒炒烏藥醋酒炒冬葵子炒蒲黃炭人參川芎酒炒劉寄奴酒炒香附薑酒醋炒蒼朮泔水浸炒黃芩酒炒白芍酒炒各一兩當歸一兩一錢三稜醋炒青皮炒枳殼麩炒丹皮乾薑炒黑各八錢肉桂六錢二十四味為末煉蜜丸每重一錢二分以一丸開水調下能保産催生行瘀生新臨産服之可免諸病按亦惟氣血有餘或奉養太過者宜之檢方者能量體裁衣斯用無不效矣如氣鬱血滯而經不調者亦可治之胎衣不下黑大豆二三合洗淨炒香入醋一碗煎數沸去豆取汁分二次服立下並治死胎山奈二片含口中津生咽下自落産後鼻衄若口鼻有黑氣乃不治之證急取紅線一縷並本婦頂心發二莖緊縛中指上以冀萬一産後昏暈清徹童溺乘熱灌之即蘇鐵器燒紅於床內淬醋中俾醋氣衝入鼻間自醒此法兼治男婦神魂不斂諸證神效並辟邪祟禾人名曰醋箭産後厄逆不止陳壁錢即喜兒窠三五個煎湯呷下立止乳不通白殭蠶末二錢酒下老絲瓜連子燒存性研末酒下被蓋出汗自通麻仁漏蘆穿山甲鵝管石各三錢麥冬王不留行各六錢六味為末每三錢七釐牡豬蹄煎湯調服其乳如泉兒科第二初生不啼鮮石菖蒲杵汁灌入口即生初生溺閉蕓薹即油菜一株蔥管五寸煎湯熏洗胎毒鵝白痰盛鬱金皂莢水煮乾焙切緑豆粉各五錢炙甘草馬牙硝各一錢共研細以生地汁對蜜煎成膏和丸用時磨濃汁鵝翎掃入口內方名黃地膏白礬硃砂各二錢五分牙硝五錢共研極細先拭淨口每二分半水調塗口舌上名保命散臍受風濕臭水時流枯礬六錢牡蠣煅三錢海螵蛸白螺殼各二錢白芷一錢五分冰片一分為末摻之半日後用熱水絞乾布拭去再摻二日斷臍後外傷風濕唇青口撮多啼不乳口出白沫全蠍二十一個去頭尾酒塗炙研麝香少許另研和勻每一分金銀花湯或麥冬湯調服名宣風散噤口撮口臍風蜈蚣一條酒炙蠍梢四條殭蠶七條瞿麥五分共研細以一字吹鼻中取嚏啼哭可治仍用薄荷湯調一字二分半也服名益黃散汪謝城曰古人所云一錢錢者量也以錢一文取藥末堆滿錢上為一錢錢半之為半錢錢又半之為一字蓋錢文有四字故以四分之一為一字也今人所云十分為一錢十錢為一兩者也每一錢為二銖四纍與一錢錢大異此乃以二分半釋一字是衡量不分矣生地生薑蔥白萊蔔子田螺肉杵爛塗臍四圍一指厚抱住泄屁即瘥名五通膏臍瘡不瘥風傳經絡欲變癇證黃連二錢五分胡粉龍骨煅各一錢各另研再合研每少許敷臍中名金黃散諸驚辰砂三錢蓬砂牙硝各一錢五分明粉二錢全蠍珍珠末各一錢麝香二分半共研細末和棗肉杵自然成膏每一豆許金銀花薄荷湯下潮熱甘草湯下月內嬰兒乳汁調塗奶上令吮下名辰砂膏天竹黃飛辰砂各一錢五分雄黃一錢牛黃四分真珠麝各三分冰片二分制巴豆霜四十九粒八味研細用鉤藤鉤一兩糯米一撮煎湯共丸如緑豆大密儲每一丸鮮竹葉湯調下附制巴豆霜法取新川巴豆四十九粒同生南星生半夏各一兩用水煮至南星半夏極爛取出巴豆以大棗七枚去核將巴豆包入棗內外以陳酒調麵糊厚放飯上蒸三次去面棗將巴豆研去油作霜痰熱痙厥俗名急驚風生石膏十兩研細辰砂末五錢研勻三歲內者服一錢七歲內者錢半十二歲內者二錢十六歲內者二錢五分大人痰厥類中風者三五錢均用生白蜜調下一服即安杜驚稀痘生川大黃生粉甘草各三分辰砂一分共研細以赤沙糖一錢開水調煬入藥末再調勻凡小兒落地後一周特用茶匙徐徐勻作兩日內隔水頓溫灌下永杜驚風之患日後出痘必稀若未服此至五七日之間已動驚風用此一服即愈稀痘橄欖核拭淨打碎連仁曬乾研細用瓶收起每逢水閉日將末挑二三茶匙加糖霜少許開水調服至多次痘可不出即出亦稀並治魚骨鯁喉痘出珠內麥冬一兩五錢杵爛如泥如干加無根水數滴成餅左目貼右足心右目貼左足心其痘自落痘瘡倒陷毒甚便血昏睡孵退雞卵殼去膜新瓦焙研熟湯調服五分月內嬰兒酒調抹唇上並塗胸背及風池穴更妙穴在胸萎骨下軟處左右皆是救急便方活人無算痘疔凡痘中數粒不起變黑而痛者痘疔也或緊黑而大或黑壞而臭或中有黑線此十死八九之證急用豌豆俗名寒豆豆圓如珠其味甜熟於孟夏四十九粒煅存性真珠一分入豆腐內煮過頭髮灰三分各研細末先以簪挑破疔咂去惡血點藥少許即時變為紅色名四聖丹胎瘡滿頭水邊烏桕樹根曬燥研末入雄黃少許生麻油調塗胎癲明礬松香各五錢蔥白七莖飯鍋上蒸熟待冷研細加東丹三錢冰片三分研勻麻油調敷松香二兩黃丹一兩無名異炒二錢鉛丹炒一錢輕粉炒三錢五味研細和勻入原株蔥管內蔥尖之口用線扎入鍋水煮熟去水曬乾去蔥再研細鳳凰油或麻油調塗土朱二兩乳香炙甘草沒藥川連牛黃各一錢六味研細每五分金銀花湯調服治一切惡痏脂水淋漓沿及遍體乍癢乍疼外用制甘石研細濃煎川連調搽即愈胎剝兩大腿近小腹處生瘡若皮脫開近小腹則不救此名胎剝先用豬膽汁抹之再用黃柏炙研敷或加伏龍肝末等分唾濕患處摻之濕瘡疳癬黃連黃柏各五錢黃丹水飛一兩輕粉一錢麝香二分半研勻洗淨患處摻之名金華散走馬牙疳蛔蟲瓦上焙乾研極細加青黛冰片各少許研勻吹之屋楞上干貓屎以硬白結燥者佳研細末每一錢加冰片一分研勻童便調敷蛇床子炒黑黃丹地龍炒黑各五錢青礬煅一分共研細揩牙齦上日三次名紫金散口舌生瘡薄荷葉荊芥穗各五錢青黛明粉蓬砂各二錢五分百藥煎甘草各三錢研細每二分半至五分點舌上令自化或新水入蜜調點舌上亦治大人名緑袍散黃柏蜜塗曬十數次甘草各一兩研細摻或用麥冬湯調點名黃金散口內多涎涎不流出乳食不下此脾胃蘊熱也硃砂半夏膽星各一兩茯苓五錢石膏六錢飛金二十頁俱研極細生薑汁丸黍米大每十丸枇杷葉湯下名金珠丹按小兒不能吞丸藥調煬灌服為宜咽喉痹痛不能吞咽蓬砂冰片雄黃朴硝等分研細摻入名立效散喉腫而痛氣塞不通朴硝一兩生甘草二錢五分研細吹入之久嗽生西瓜子煎濃湯常服亦治大人兼治吐血諸疳肚大黃瘦及腹痛蟲積痰熱風痙等證雄黃三錢膽星二錢全蠍去足炒殭蠶炒各一錢麝香巴豆霜各五分俱稱淨末神麯糊丸菜子大飛辰砂為衣每一丸白湯下疳積便瀉皮硝三錢杏仁生梔子紅棗各七枚連須蔥白七莖飛面三錢酒釀或渾酒腳和搗如泥攤貼腹上以布縛之腹露青黑色五日一換以腹白為度重者三作必愈蓮子山藥各五錢史君子肉生熟各半四錢川連胡連神麯楂炭麥糵各三錢青皮炒二錢九味研細水法丸每服一錢五分開水送下疳膨食積蟲氣上攻至晚不能視物目生翳障等證雞肝一具不落水竹刀切片用牡蠣粉八分辰砂少許水飛研細拌勻糝入肝內飯上蒸熟食之如此十次翳障退淨服藥時忌茶湯油膩目閉不開不赤不腫不能用藥黃連煎濃汁塗足心無辜卒死蔥白杵爛納入兩鼻孔及下部氣通有嚏即活養生第三養生之道不必旁求大易云慎言語節飲食豈非不刊之論應休璉詩云量腹節所受斯得其旨矣孔子曰食無求飽隨園詩話云無求便是安心法不飽真為卻病方無病平人飲食宜節體稍不適尤勿強食病之初來未必甚劇不慎口腹遂至結轖變證多端不能盡述非遇明眼貽誤莫識凡在病中慎口須知豬羊雞鴨外感忌之堅硬壅滯諸病不宜薑萸椒蒜熱證勿施瓜果生冷寒病休窺産婦痘後發物毋沾沉疴痼疾禁例同嚴正衰邪盡補食宜餐胃弱忌苦脾困喜酸滑澀辛甜各有宜忌物性多偏不可專嗜病從口入膏粱莫及厚味臘毒古訓須識淡泊能甘病奚能肆撙節得宜病愈必易無如愚人罕明食性當禁不禁禁非所禁倒行逆施反以加病彼此貿貿甚至殞命我見實多弊難筆竟聊贅俚言以為世鏡虛勞第四童勞鮮百合鮮地骨皮紅棗藕白粳米等分砂甑蒸露常服代茶百日自效童栻盧云此方不但童幼適口且無敗土之虞真妙法也治經多人歷有成效按大人內熱津虛者亦治黑大棗豬肉各一斤地骨皮四兩煮食薛瘦吟極言其效按大人羸瘦內煩者亦治虛弱蛤殼煅飛五兩滴乳石水煉飛飛青黛各一兩參貝六賢散一兩五錢方見後共研細秋石湯調五六分治虛火上炎氣升咳逆時吐涎沫為保肺清金而不礙脾胃之要藥生地三兩茯神三兩五錢紫石英煅飛遠志棗仁炒各二兩當歸一兩五錢人參麥冬丹參製半夏各一兩石菖蒲八錢膽星四錢琥珀三錢川連二錢十四味研細用連血豬心一個入辰砂三錢煮爛打丸如干加煉蜜或獨用煉蜜亦可每丸重一錢五分辰砂為衣空心棗湯或鹽湯化服每服一丸名通神補血丸專治神虛血少驚悸健忘不寐怔忡易恐易汗等證金毛狗脊去毛王不留行各四兩冬蟲夏草十大功勞各五兩紫花地丁六兩沙苑蒺藜八兩八角金盤十兩七味以甘泉桑柴火砂鍋或銅鍋煎至味盡去渣熬膏將成入黑驢皮膠三兩收另用八達杏仁去皮尖一斤研末和搗為丸如蓮子大飛金為衣名清金養血丹治男婦虛勞夜熱咳嗽痰喘胸悶咯血腸紅並治血不養心夜不安寐手足拘攣步履艱難及老年喘逆胃閉溲短便泄等證每服二丸絲瓜絡煎湯或藕湯送下小兒減半孕婦忌服或並八達杏仁熬膏服亦可西洋參龍眼肉同蒸透沙蒺藜鹽水炒萸肉酒炒茯苓人乳拌藥各二兩直生地直熟地炒仁末拌砂白朮土炒各四兩杞子酒蒸五次一兩五錢肉蓯蓉焙五兩血餘一兩二錢虎脛骨酥炙一對十一味為末用羯羊肉四斤剔淨油膜取純精者酒水炙取濃汁打丸桐子大每服四錢淡鹽湯下治下元虛弱腰足軟神疲色瘁勞怯損傷諸症神效名培本丸解佚精虛髓竭也辰砂飛乳香去油燈心同研各一兩以雞卵二枚打一孔去其黃白將二味各裝雞卵殼內紙糊七層青絹袋盛之令精壯婦人貼肉懷於臍間常使溫暖辰砂懷三十五日乳香先十四日備懷四十九日取出各再研細另用茯神赤石脂川椒去目及閉口者微炒出汗各二兩三味預為細粉與砂乳粉和勻以蒸熟紅棗肉杵丸緑豆大每三十丸空心參湯或溫酒下一月外加至四十丸名遐齡萬壽丹又名五老還童丹須甲子庚申夜幽靜處修合忌婦人雞犬見之陽衰胡椒五粒母丁香三粒黃丹三分生礬一分共研細醋調塗臍中外以膏藥封之名健陽膏生附子甘草大蒜青蔥甘遂各二兩海馬川椒紫梢花沙苑子蛇床子狗膽良薑故紙鹿茸木鱉子狗頭骨山奈五味子大茴香各一兩海螵蛸韭子木香地龍胡椒穿山甲鎖陽全蠍當歸蛤蚧蜈蚣蜂房各五錢三十一味用麻油四斤浸夏五日冬半月春秋一旬煎枯去渣熬至滴水成珠以鉛丹收待溫攪入後十三味肉桂二兩公丁香一兩鴉片陽起石石硫黃乳香硃砂干安息各五錢元精石蟾酥麝香各三錢以上俱研極細蘇合油五錢丁香油三錢並徐徐攪入即成治陽氣虛弱腰軟腳痠溺冷便溏神衰痿憊等證以此攤貼湧泉腎腧丹田等穴甚有效名黍谷回春膏杜仲歸身乳香各五兩丁香甘草川芎半夏蒼朮黃耆檀香木香各三兩附子大茴洋參各二兩藝香降香薄荷甘松桂枝巴戟杷子山奈辛夷鎖陽乾薑益智獨活五味子干安息各一兩沉香六錢三十味研細或加海馬一對拌入蘇合油瓊玉膏各三兩丁香油二兩和勻收儲每一劑用藥四兩五錢配艾絨八錢加肉桂鹿茸冰片各一錢麝香五分研細拌勻鋪於綿上闊二寸半長三尺余再用紅布包而縫之外包以綿綢或湖皺長四五尺線行為帶可繫於腰名暖臍帶或作肚兜式系之亦可故一名暖臍兜治陽虛體弱食少便溏氣滯血寒結成症痞男婦內疝腹痛腰疼諸證極效但止宜繫於冬令春時即當解下略焙藏錫器中勿泄氣則一劑可用二三年男子陰虛火盛女子血虛內熱者勿用唾血甘梨六十個去心打取汁二十鍾酸者勿用生藕汁白茅根汁生地汁各十鍾麥冬煎濃汁五鍾生蘆蔔汁五鍾上汁合和重濾去渣緩火煎之入煉蜜一斤飴糖柿霜各八兩生薑汁半小杯再熬如稀糊收起去火氣每挑服三五匙日三不拘時咳血天冬麥冬各二錢五分生地薄荷各二錢川貝去心茯苓各一錢桃仁去皮尖犀角羚羊角各五分水八杯煎至三杯去渣入梨汁藕汁蘆蔔汁青蔗汁白人乳各二杯熬成膏加煉白蜜二兩收重湯再頓半日服法如前按前方名元霜紫雪膏此名五汁膏所用取汁之物或非全有之日則竹瀝蘆根汁之類易一二味可也火嗽梨汁藕汁蘆蔔汁鮮薄荷汁各二杯入酒炒枯芩細末一兩白糖霜一兩細火熬成膏服如前法名化痰膏干嗽直生地二斤八達杏仁去皮尖白蜜各四兩生薑洗淨二兩共搗如泥飯上蒸七次每五更挑三匙咽下名補肺膏久嗽直生地直熟地並酒浸天冬麥冬各二兩川黃柏鹽酒炒白芍酒炒茯苓山藥杞子元參生苡仁川貝去心陳皮各一兩北五味七錢甘草五錢各研細白蜜丸彈子大空心噙化名滋化丸天花粉一斤用清水浸洗刮去粗皮切片曬乾磨細末篩過取極細者盛絹袋內於清水中揉洗出漿去渣澄清換水如此五七次芳味去盡曬燥取十二兩緑豆粉水漂三五次曬乾四兩二粉共一斤用薄荷一斤入瓶內葉層層間隔裝好封瓶口入鍋內隔水煮三炷香取起冷定開瓶篩去葉取粉配入白檀香白石英白蓬砂各五錢白豆蔻仁元明粉各一兩白石膏二兩煅柿霜三兩白糖霜八兩同研細末和二粉密盛瓶內每以一二匙噙化消痰止渴涼血滋陰明目安神滌煩解渴醒酒闢穢名白玉丹好道地橘皮陳而色紅者米泔水洗淨略去白銼大片曬乾一斤初用枳殼四兩去穰淨用水六碗浸一宿煎濃汁二碗拌橘皮浸透一夜次日蒸透曬乾次用甘草三兩去皮照前湯浸蒸曬乾三用款冬花去蘆根淨四兩用水照前煎浸曬乾四用桔梗去蘆淨四兩用水浸一宿煎濃汁二碗去渣入白蓬砂元明粉青鹽各四錢化開照前拌曬浸一宿蒸透曬乾五用竹瀝浸拌照前蒸曬六用梨汁浸拌照前蒸曬七用生薑汁蘆蔔汁浸拌照前蒸曬名七制陳皮能消食寬中化痰順氣配以百藥煎五倍子不拘多少敲如豆瓣大揀淨用白酒糟拌勻置暖處候發過不澀酸為度曬乾研末名百藥煎天花粉制過者尤佳人參細茶葉紅者勿用亦勿太陳半夏制烏梅肉薄荷葉山楂末各一兩沉香檀香各一錢北五味白蓬砂各五錢共研極細加白糖霜十兩煉白蜜十兩和勻搗千杵印成小餅子名清金丹降火生津臨臥或火升涎嗽之時噙口中化咽製半夏四兩元參甘草各三兩薑製南星二兩青鹽十兩陳皮一斤去白略煎去辣味六味以好泉水同煮候乾曬燥為細末以西洋參川貝母去心各二兩蛤殼煅飛六兩俱研細和勻每用五六分不拘時開水調下名參貝六賢散去蛤粉以叭噠杏酪丸如龍眼核大臨臥噙之口中聽其自化滲入咽中尤滌痰治嗽良法並治胸膈不舒痰多食少極效中虛久嗽飴糖二兩淡豆腐漿一碗煮化頻服郁痰久嗽川貝去心一兩叭噠杏仁去皮尖五錢青黛飛五錢共研細生薑汁和勻白糖霜丸櫻桃大噙化名清化丸吐血蠶退紙煅存性研蜜丸芡子大含化咽津丹參一味飯鍋上蒸熟日日泡湯代茶飲荊芥穗燒過蓋地下存性研末陳米湯調服二錢數服即效兼治下血今人治血證專用補法是一隅之見也白芨炒炭四兩丹參炒黑驢皮膠蛤粉炒各二兩大黃炭一兩四錢百草霜三七焙丹皮炭桑皮蜜炙蒲黃炭各一兩艾炭六錢血餘炭五錢炙草四錢十二味共研細每八分童便或茅根湯調下治吐血不止沖逆欲絶者大效甚者以此藥一錢拌入瓊玉膏三錢側柏葉湯下若吐血兼有臭膿者內有癰也用花粉桔梗各一錢地榆八分炙甲片皂角刺連翹各七分銀花六分丹皮黃芩各五分甘草四分十味蘆根湯煎服歷驗傳尸勞硃砂雄黃雌黃硫黃麝香各五分為末燒酒調擁患者背上膏肓穴分作三次用布蓋之將尉斗盛火自下尉上其蟲從口出預製小口紗袋一隻中撑竹絲令病人以口就袋口使蟲入袋內殺之勿令脫逃若非傳尸等證內本無蟲不可擅用此法恐陰虛內熱之損怯證誤用必致動血烹一雞置小盒內晚間令病人餒腹就睡以盒置床頭半啓其盒使雞香近鼻如病人睡醒急將蓋罨好緊閉而封之明日啓視必有小蟲當以火燎之如此引數次蟲盡病自愈按誤食蜈蚣子入腹者亦可用此法引出人參赤茯苓遠志鬼箭羽石菖蒲白朮蒼朮當歸各一兩桃奴五錢雄黃硃砂各三錢牛黃麝香各一錢十三味為末酒糊丸龍眼大飛金為衣每一丸臨臥木香湯下更以絳囊盛五七丸懸床帳中諸邪不敢近並治邪祟疫癘精魅蠱惑諸病甚效名避邪丹哮喘第五熱哮俗名痰火口渴苔黃小溲短赤是萊蔔子二兩風化硝一兩共研蜜丸芡子大每一丸噙化陳海蜇漂淡荸薺洗淨一兩劈開二兩無則用蘆蔔煎至海蜇煬盡為度頻飲自愈久服除根但須忌油膩生痰諸物此方兼治胸腹飲癖及肝火鬱結胃氣壅滯腹中大痛疳膨食積滯下瘀停痢後腹脹諸證並效病重倍用或四倍八倍均可以皆是食品雖有殊功而不傷正氣也方名雪羹王晉三制以清肝熱余為引申觸類應變無窮凡用成方皆須識此自然法古意新甘草一二錢煎湯煮蘆蔔一二兩候熟下白糖霜生石膏末各二錢再滾數沸連湯吃盡永不再發冷哮禁用甜熟大枇杷十斤去核皮白糖霜二斤同入砂罐內密封置靜處一月清徹如水每飲一杯連服即愈冷哮薑汁和蜜少許煎溫服火證忌施實哮萊蔔子蒸曬一兩牙皂燒存性三錢共研生薑汁和竹瀝丸芡子大每一丸噙化名清金丸多年不愈受寒即發痰氣壅塞不能著枕之證生石膏六兩桂枝去皮麻黃去節甘草細辛泡白芍五味子焙打各一兩製半夏一兩五錢乾薑泡二次炒七錢共研末收儲病發時用二錢加入生薑四錢北棗劈二枚煎去渣臨臥服二三劑即愈川大黃四兩用竹瀝一兩薑汁一錢朴硝三錢拌蒸三次蔞仁去油蛤殼煅飛橘紅炒各四兩茯苓陳膽星薑製蒸茅朮炒各三兩天麻煨浮石煅飛蓬莪酒炒白芥子炒各二兩薄荷葉一兩六錢石菖蒲沉香青黛飛各一兩製半夏竹瀝薑汁炒六錢川黃連薑汁炒五錢天竹黃白蔻仁各三錢冰片一錢二十味為細末以竹瀝九分薑汁一分泛丸緑豆大再用煨石膏五錢牛黃二錢辰砂一錢三味研細為衣每一二錢開水下治飲食化痰胸膈迷悶氣逆咳嗆及哮喘中痰諸證醋哮醋搶喉管哮嗽不止諸藥無效者生甘草二兩作二段刮去皮以豬膽五枚取汁浸三日取出火上炙乾為末蜜丸緑豆大臨臥清茶下四五十丸痰喘胡桃肉一兩細茶末五錢白蜜和搗如彈子大噙化忌蔥兒茶白檀香白豆蔻麥冬蛤粉川貝去心各一兩天冬薄荷葉各五錢桔梗木香各三錢麝香一錢冰片五分共研細以甘草四兩熬膏丸芡子大每噙化一丸反胃及痛噎隔第六翻胃大甜梨以銀簪搠孔插入丁香十五枚箬包好火煨熟去丁香日啖一枚文蛤煅二兩白玉蘭二賢散各一兩生大黃六錢紫玫瑰五錢沉香三錢共研細每一錢八分淡薑湯調下兼治肝鬱氣逆胃氣不和食少痰多時欲嘔惡附二賢散方橘紅一斤甘草四兩青鹽五錢水煮爛曬乾研末附開胃止吐法錢塘陳雲柯中丞口傳凡病久飲食不沾諸藥不受者仙製半夏陳皮各四兩用砂鍋好水在病榻前煎之令病人聞其香氣俟味盡去渣將汁仍於病榻前熬成膏盛入碗中去火氣以小匙頻挑入病人口中即能止吐納飲試之皆驗此因痰阻膈中也又野云自驗中虛嘔吐飲食不納者干蓮子略敲一二十粒煎清湯呷之胃虛嘈雜吐水脈弱神疲不渴能食二便如常者生首烏肥雞食