四錢輕粉川烏甲片土炒阿魏瓦上炙去油腰黃各三錢乳香沒藥皆去油牙皂當門子各二錢良薑丁香白胡椒肉桂各一錢吉日靜室誠制先各藥研細再研勻瓷瓶密收勿使泄氣一切陰分疽毒初起如對口發背瘰癧乳癬便毒之不紅腫焮熱者照腳地之大小摻膏貼之如患處已有膿亦可貼名陰毒內消膏癰瘍初破西瓜硝一兩雄黃石膏煅各六錢地榆炒蓬砂各五錢藜蘆炒烏梅肉炒炭各三錢殭蠶炒二錢冰片牛黃各一錢十味研粉收儲凡外瘍初破毒未化者四圍以圍藥圍之將此藥用麻油調塗瘡孔外以提膿化毒膏貼之早晚一換此拔毒之聖藥也名瓜硝拔毒丹提膿化毒象皮穿山甲各六兩男發洗桃枝切柳枝切桑枝切槐枝切各四兩生山梔六百枚杵八味用麻油十斤浸春五日夏三日秋七日冬一旬煎至枯濾去渣熬至滴水成珠以炒丹鉛收之待少溫入後三味淨硇砂四兩血竭二兩兒茶一兩二錢均研細攪入成膏收儲專治一切外瘍毒未盡者照瘡形大小攤貼一日二次甚效名提膿化毒膏凡油一斤收丹七兩為老膏四兩為軟膏此方若加入收口藥熬之可治一切瘡口不合之證諸疔先尋脊骨上有紫黃色瘰點用銀針挑破出血其毒即泄細看腿彎間即委中穴有紫黑筋用銀針刺出血即愈雄黃研一錢烏梅肉三枚杵爛蜒蚰二條共搗爛塗之根即拔出初起飲真麻油一碗雖毒重無性命之虞並治血疔血出不止再用肥皂杵爛和沙糖調勻圍之大斑蝥去翅軟米制六錢全蠍炙三枚血竭二錢沒藥炙乳香炙各一錢冰片麝香各六分元參四錢泥固煨去泥用八味於端午午時制研收藏摻膏藥上貼之拔疔最妙生南星生半夏五倍子慈石煅陳小粉炒各一兩明礬生軍各二兩東丹六錢鐵鏽瓷粉各五錢雄黃蟾酥焙各四錢熊膽二錢山白煤一兩四錢共為末豬膽汁打錠專治疔瘡初起根腳不收堅硬發麻用醋磨塗四圍名疔圍活鯽魚一尾杵爛入研細辰砂拌勻圍之漸圍漸小其疔自拔治面疔屢效辰砂二分八釐蜈蚣頭炙雄黃各二分四釐輕粉制白丁香蓬砂蟾酥各一分四釐乳香一分麝香四釐金頂砒七釐或以鐵鏽代之十味研細用燒酒蟾酥和丸或扁或尖均可即古方立馬回疔法以之拔疔甚妙目前用以代刀亦佳魚臍疔瘡頭黑破出黃水蛇蛻一條燒存性研雞子調塗之韭菜絲瓜葉連須蔥白同杵爛取汁熱酒和服病在左手渣貼右腋下病在右手渣貼左腋下病在左腳渣貼右胯病在右腳渣貼左胯在中貼心臍以綿縛定候肉下紅淺處皆白則散矣須令人抱住恐其顛倒則難救矣水疔痛極白梅肉荔枝肉共搗貼易數次愈暑瘍生芋片貼之諸惡瘡白蜜搽諸瘡臭爛白礬雄黃等分煎洗諸瘡不斂先以槐枝蔥白湯洗淨復以瓦松陰乾研摻三黃制甘石五兩白螺殼煅飛三兩白蠟一兩五錢蔥制輕粉六錢人參牛黃各二錢真珠一錢五分冰片一錢八味研極細無聲為度治一切大小癰疽流毒已多久不收口用麻油調塗瘡孔外以象皮膏蓋如眼細而深者將綿紙合線蘸此藥插入亦妙若方中加鳳凰衣更佳血竭三錢乳香炙沒藥炙赤石脂雄黃各一錢五分輕粉制一錢冰片麝香各一分八味研細以無聲為度制甘石煨石膏赤石脂煅各三兩大蚌殼煅去黑衣陳年吐絲渣煅兒茶各一兩血竭三錢冰片二錢五分研如前上二方皆主生肌長肉平口收功均極神效以上三方並有八寶丹之名審宜擇用可也余如人指甲人腳皮三七龍骨之類亦可隨證加入諸瘡出血燈心炭百草霜黃牛矢煅炭各三錢花蕊石煅龍骨煅參三七各六錢琥珀一錢五分陳墨川連各一錢兒茶五分十味研細以無聲為度治一切瘡口出血不止以綿絮蘸而按之惡瘡淫火惡肉朽骨枯白礬一兩枯緑礬雄黃乳香遠志肉胭脂各一錢研細蜜水或麻油和敷名消蝕散惡瘡年深不斂白芷一兩川芎二兩白芍三兩輕粉三錢研摻瘡口深者紝之名搜膿散惡瘡去毒生肌滑石一兩銅緑五錢輕粉二錢冰片麝香各三分粉霜二分半研勻紝瘡口以膏封之名翠霞散瘡瘍毒盡白芨白蘞黃柏黃連黃丹洗淨炒乳香另研麝香等分研末摻瘡口二三日即生肌平滿名桃花散諸漏或一處或周身不等並治諸瘡年久不愈人牙油頭髮雄雞䏶胵等分煅存性研加麝香輕粉少許麻油和敷象牙屑八錢蝟皮一張帶子大蜂窠二個同蝟皮新砂鍋內焙黃色明雄黃七錢硃砂六錢瓜兒血竭白礬各五錢兒茶去油淨四錢乳香去盡油沒藥去盡油各三錢共研細熔黃蠟丸梧子大每二十四丸槐花煎湯和黃酒空心下忌醋葷腥惱怒名甘露丸兼治瘀停脘痛鵝毛管火上炙存性同鹿角研細敷孔內以膏蓋貼水銀三錢雄黃一兩以燒酒二斤漸煮漸添酒盡為度研細末取大蟾蜍一隻去腸留肝肺將藥末納入縫好另用銀硝明礬各一兩入陽城灌加水半茶鍾放火上熬干於底取起置地上入蟾於內升文火二枝中火一枝武火一枝候足開看刮下靈藥以杜蟾酥丸如芥子大凡管以一丸放管口外蓋膏藥力能至底雖彎曲必達軟管自化老管自退七日見效如不全退再一丸無不除根名金蟾化管丸黴瘡以艾火灸先起第一瘡五壯每日空心服麻油一杯其瘡自愈永不結毒最妙簡效方也龜甲酒炙四兩石決明童便煅二兩硃砂甘草各四錢四味研細用土茯苓四兩煎湯泛丸梧子大每二錢空心土茯苓湯下治黴瘡結毒瘡形腐爛筋骨疼痛遍體發瘡等證名珠龜丸癘風遍身腫爛眉發墮落者是與黴瘡同為淫毒之氣所釀也大蟾酴一隻泥裹煨熟去泥以大碗盛之小碗蓋好入熱酒半碗隔水煮一刻盡吸之取汗為度煨大黃皂角刺各一兩為末每三錢空心酒下瀉惡物如魚腦未瀉再服所下之蟲如亂髮然待蟲盡止服豨蘞六兩生地四兩羌活三兩當歸二兩天麻煨一兩二錢塊紅花防己防風木瓜酒炒白蒺藜炒去刺一兩蛇蛻酒洗蟬衣酒洗甘草各五錢十三味為末另用豨蘞三兩煎湯泛丸緑豆大每三錢臨臥開水下凡蛇皮癩紫雲風皆其類也膿窠瘡舊傾銀罐子研粉麻油和塗最舊齷齪鞋一雙最舊用久絲綿絮筋俱燒成灰候冷再用大楓子肉為末合成一處菜油調敷兩日必愈如未能幹燥即以二物之灰摻之甚效門檔上塵黃丹松香胡椒炭生大黃生白芷蠶豆殼炭煨石羔枯礬棗紅棗明礬同煅至炭研末也九味等分研末摻乾者麻油調搽廚房倒挂塵三錢煅伏地氣松香茴香花椒硫黃煅乾蟾枯礬蒼朮白芷硃砂各一錢共研細以雞卵一個挖一小孔灌藥於內紙封固幽火中煨熟輕去殼存衣另用生豬脂和藥蛋搗爛葛布包之時擦患處松香一兩雄黃一錢共研竹紙卷條菜油浸一宿燈上燒之取滴下油頻搽先以車前草濃煎洗淨並治肥瘡煨石膏二兩寒水石炙乳香各五錢膽柏一兩膽柏未詳四味研末凡膿窠疥瘡延久不愈以致身熱惡食驚搐不安先用甘草木瓜煎湯洗淨後以此藥麻油和塗患處能潤肌化毒拓膿殺蟲止癢內須服紫霞丹四五分燈心湯下疥瘡真老松香四兩蔥汁一飯碗入瓷鍋內熬煬煎至滴地即凝加東丹一兩調勻候冷研末麻油調搽風化石灰和醋漿調塗隨手而減或以石灰汁淋洗枯礬滑石各五錢硫黃二錢共研末豬油調搽生礬三錢硫黃蛇床樟腦各二錢共研雞子清調和再加熬熟菜油攪勻飯上蒸過敷久不愈者金蛇蛻燒存性研豬油調搽鮮首烏一兩川萆薢五錢每日煎服匝月必愈大楓子肉五錢桕燭油川連各三錢明礬一錢五分川椒一錢水銀五分六味共研至水銀不見星加豬油調相得絹包擦疥瘡痛癢效癬白礬炒極干為末豬油和塗初起以海螵蛸一塊時常擦之白芨二錢土槿皮八分二味研末少加白糖霜百滾水攪如糊用棉紙攤貼陰癬效爛癬臭硫黃生大黃土茯苓等分明雄黃減半明礬再減半共研裹草紙內捲成筒用桐油浸透燈上燒之瓷盤接取其油候冷以鵝翎蘸塗一二次即效瘤竹刺撥開瘤上薄皮不必見血研銅緑置其上膏藥封之以上通治一身諸證以下上中下三部證禿瘡紫蘇以麻油熬成膏塗之生羊肉切大厚片如常炙熟乘熱遍貼俟蟲出著羊肉上若不盡再作取盡以鹽湯沐之再用雄黃末和豬膽汁塗之黃豆炒黃研末菜油和塗黃柏血丹膽礬煙膠等分研麻油調勻剃頭後敷之三四次愈瘡濕者乾摻亦可兼治耳內膿水等患名四平散榆皮為末米醋調敷吳萸研細以陳蠟燭油烘煬調厚剃頭後擦敷數次愈愈後忌食海鮮一年犯者必發蟺疒貢頭照其腫之大小用枳殼半個去瓤以生飛面調糊塗在枳殼沿上如道冠樣戴在毒上其毒水自能釣出候其脫下腫處自小再用小些枳殼半個如前塗覆水漸釣干俟其自脫不過六七日腫平而發茸矣此證在頂心腫起先白後紅如不治愈疒貢愈多旁添小者如百烏朝王一般既在頂心不能開刀即潰膿亦不淨惟此方簡效無比肥瘡黃牛皮燒存性研菜油調搽松香明礬各二錢花椒四錢東丹一錢加豬網油共杵爛卷在五寸真青細布內在火上熏出油以碗接之去火氣塗患處效加輕粉一錢效更速皂莢燒灰菜油調敷蒲桃瘡黃柏一兩乳香二錢五分研細槐花煎濃汁調塗面瘡黃連黃柏炙胡粉炒等分研豬油調塗肺風瘡黑脂麻去皮紅蓮子水浸軟去衣不去心每早食之鬢疽陳石灰蔥白同搗敷龜板煅研桐油和敷腮腫大黃末和蔥汁調勻圍之上疳喉疳牙疳口瘡之類輕粉三分冰片二分雄黃二釐半硃砂七釐共研細先以薄荷湯漱口吹入或敷生大黃三錢緑豆粉二錢炒丁香十粒研勻開水調塗兩足心頸癧舊明角燈煅存性研菜油調塗制甘遂紅芽大戟各二兩白芥子八錢麻黃四錢生南星薑製半夏殭蠶藤黃朴硝各一兩六錢以麻油一斤先入甘遂南星半夏熬枯撈出次下大戟三下麻黃殭蠶四下芥子五下藤黃逐次熬枯撈出六下朴硝熬至下爆用絹將油瀝淨再下鍋熬滾徐投入炒透東丹攪勻丹之多少以膏之老軟酌用夏宜稍老冬宜稍軟膏成乘熱傾冷水盆內扯拔數十次以去火毒即可攤貼宜厚勿薄名消核膏吾鄉許君辛水方也兼治乳核流注及各種結核甚著奇效許君附其方於重訂外科正宗余與參校蔣君寅昉慨付棗梨甫刻竣即遭兵火許君又云膏之老軟各有所宜凡潰瘍諸證膏勿太軟總以貼之即黏揭之易落為度攤勿過厚軟而過厚則揭時非帶脫皮肉即黏住皮肉凡熱癤本可無瘢而或生妒肉或如蟢鏡者非黏傷其肉即膏粱不忌也獨消核膏宜少軟但令貼時勿煬塌而已攤須極厚蓋此膏本以代敷藥軟而厚則藥氣濃郁而能深入又其皮肉如常無慮帶脫而黏住可洗也即煎膏亦有法度藥物堅脆不齊若一同投入則脆者先枯堅者實未熬透雖銖兩較重而味終未出也推之諸膏皆須準此余按頸癧結核諸證無非痰患故許君以控涎丹為君而加行氣散結為佐宜乎施之輒效也田中螞蝗杵爛圍之即散雄豬膽約百個取汁入夏枯花三兩鍋內同熬去渣收至滴水成珠加入沉香末三錢砒霜三分和勻收入瓷罐內攤貼患處已潰者塗四圍大鯽魚二尾破淨入獨核肥皂十餘枚以瓦兩張合好兩頭泥封之火煅至青煙起為度取出研細每早醇酒調服三四錢忌煎炒薑椒發物愈後終身忌食鯽魚栗子夏枯草末六錢甘草末一錢研勻每二錢茶清下生山藥一塊萆麻子三粒各去皮研勻攤貼草本白玉簪花軟葉以米醋浸一宿飯鍋上蒸熟扯如膏貼之蛤殼煅四兩元參三兩象牙屑黃耆土貝昆布各二兩海藻製半夏各一兩五錢制西洋參炙草川貝各一兩十一味研末夏枯草四兩忍冬藤五兩煎濃湯泛丸緑豆大每二三錢空心開水服治虛痰滯絡結為瘰癧不論已破未破此方最良丹雄雞全骨一副生取千里奔即驢馬騾修下蹄甲也五錢紫降香五兩當歸生甘草各一錢槐樹枝三十寸先以雞骨入麻油鍋內微火煎枯入後藥亦用微火煎枯去渣二油一丹收成膏浸冷水中拔去火氣不論已破未破量大小貼之以愈為度兼治乳岩亦效萆麻仁二百粒杵番木鱉生半夏生大黃牙皂各四兩斑蝥一百個巴豆仁五十粒杵穿山甲二兩甘遂一兩九味用麻油二斤浸冬半月夏五日春秋一旬熬至藥枯去渣再熬至滴水成珠以炒鉛丹收之俟稍溫入後十一味真硇砂另研雄黃各五錢乳香炙沒藥炙各四錢樟腦蓬砂真番硇此西藏名産不易得勿用亦可不過藥力較遜耳各三錢蟾酥麝香各二錢阿魏冰片各一錢各研細和勻攪入成膏收儲治痰串瘰癧諸核如神用時攤膏貼患處膏之中央須剪一細眼為要並治一切外瘍堅硬不消空頭代圍藥貼之其塊漸化野云曰此證善竄故俗名癧串與流注相似皆肝熱生痰風激入絡結而成核毛氏主控涎丹徐氏主大活絡丹一治實痰一治虛痰用者酌之余執其兩端而用其中每以指迷方茯苓丸治瘰癧流注輒效初起者應手而瘳蓋茯苓丸原主痰流手臂推廣其義顛癇類中諸病之屬於痰入絡者余亦屢收奇績死方活用在人之善悟耳白蛇纏頸上周圍細白泡者是白芨末柿漆調敷絲瓜藤杵汁搽或以乾者煅研菜油和塗天泡瘡錦紋大黃磨水頻搽鐵鏽釘醋磨汁搽並治蟢兒瘡蚯蚓泥或風菱殼煅存性研井水調塗小麥炒黑為末桐油和敷蓮蓬殼煅研並水調塗絲瓜葉杵汁塗鮮蠶豆外殼炒黑研麻油調敷擔肩生蒜切片較患處大些安患處艾灸三壯五倍子糯米雞卵殼石灰等分研摻乾者菜油調搽對口鰟鮍魚連腸骨杵爛敷薑汁磨陳墨圍兩邊以白梅肉打爛豬膽汁和塗瘡口頂大肥皂一條去子弦婦人篦下頭垢三錢生山藥三寸同搗敷不論初起腐爛頻敷自愈芭蕉根四兩洗淨杵爛熱酒沖服渣敷患處大鯽魚一尾去鱗腸入瓷罐內杵爛加頭垢二三兩拌勻敷上中留一孔以紙貼之一二日愈以上二方初起即愈生橄欖核瓦上炙成性研極細桐油調勻雞毛蘸刷四圍露出頭勿令藥干干即再圍發背凡人中熱毒眼花頭暈口苦舌乾心驚背熱四肢麻木覺有紅暈在背者即用槐子五兩鮮者更佳揀淨銅杓內炒褐色泥地攤去火氣以好酒一碗煎滾去渣服出大汗即愈未退再服即消已成者三四服即減輕渣杵爛敷患處兼治魚口便毒亦效陳石灰東丹銅緑等分研細加西牛黃一分和勻雞子清調成膏以舊黑傘紙攤夾用銀鐵於傘紙上刺數眼扎縛患處如干易之甚者三四次必愈海馬一對雄黃三錢硃砂穿山甲炙各一錢冰片麝香各少許六味研細再入水銀一錢研不見星收藏凡遇危急之症日以少許點患處兼治疔瘡栝蔞五枚取子乳香棗大五枚各研細沙糖熬膏每三錢溫酒下兼治胸腹生癰宮粉一兩輕粉銀硃雄黃乳香去油沒藥去油各二分半共研細聽用先將好茶葉煎濃湯洗患處後將豶豬腰子切開摻藥五分於上蓋患處待藥如蒸良久取去一日一次拔毒減痛潰出穢膿不可手擠輕者二次愈重者七八次愈兼治對口及一切癰瘍潰爛當歸二兩白芷五錢甘草一兩二錢紫草二錢麻油浸七日然後入鍋煎至藥枯去渣再熬至滴水成珠下白蠟二兩攪勻再入血竭研細四錢待冷再下輕粉四錢攪勻待成膏蓋好聽用陳久愈佳勿輕加減兼治對口及一切癰疽大毒腐去瘡孔深而洞見膈膜者用此填塞瘡口自能生肌長肉收口乃外科聖藥也名玉紅膏巴豆仁白芨切番木鱉切川烏切草烏切各五錢商陸切片十兩漏蘆鬧羊花全歸切穿山甲切元參切蝦蟆皮乾須新取收干各二兩萆麻仁白蘞切川大黃切雄鼠矢各三兩蒼耳子四兩黃牛蹄甲敲研豬蹄甲敲研各一兩烏羊角一對敲研鯽魚二尾重十二兩以上者凡二十二味入大廣鍋內真麻油三斤八兩浸三日熬至各藥焦黑濾渣再熬沸入飛淨血丹二十四兩以槐柳條不住手攪熬至滴水成珠息火待冷再入上肉桂心五錢乳香沒藥上藝香各去油上輕粉各四錢此五味並研細徐徐摻入以銅箸攪勻待凝冷覆地上十餘日拔盡火毒凡一切癰疽疔毒皆可用以箍膿未成即消已成即潰不至大患名巴鯽膏肺癰其證初起咳嗽即兩脅疼痛元參八兩天冬四兩桔梗二兩炙甘草一兩水十碗煎至二碗入蒲公英金銀花各五錢煎至一碗徐徐服之初起即消久者亦愈甘草土貝各二兩乳香炙沒藥炙槐米各一兩炙山甲八錢沉香血竭葶藶血餘各六錢雄黃飛五錢十一味研末水法丸如緑豆大牛黃為衣每一丸開水下名內消神效丸治一切內癰初起未潰膿者服之即消乳癰芙蓉花杵爛敷上疱起即消如干花瓣以雞子清或醋調塗凡芙蓉開時採浸鹽滷中備用貼諸癰瘍皆妙芙蓉根切片醇酒煎儘量飲即消如掘鮮者杵汁酒沖服睡醒即消其痛如失白蠟一錢酒化服蚶殼煅存性研末醋調塗芭蕉葉杵汁生白蜜酒和服渣敷乳癤陳半夏連須蔥白共杵爛絹包如指大左患塞右鼻右患塞左鼻乳吹用硃筆書十一地支於本婦所戴簪上本命屬不書戴之無論內外吹初起極驗象牙屑棉花仁炒去油葫蘆芭石決明煅土貝母各二兩蒲公英鬼饅頭橘葉蓮房各一兩五錢炙草花粉鹿角屑麥糵各一兩乳香炙五錢小青皮十五味研末每一錢六分橘核煎湯調下治內外吹乳癖乳癧皆良乳癖正名乳裂上川連三分制甘石二錢黃柏五釐牛黃三釐四味研細麻油調敷乳岩大栝蔞一個半生半炒酒三鍾煎一鍾食後服生蟹殼砂鍋內焙焦為末每日二錢酒下勿間斷以愈為度橘核一兩炙存性研分三服酒下甘草水洗淨二錢白蠟三錢酒煎去渣服五七次效圓蛤殼研末加皂莢末少許醋煎去火氣敷此證初起不痛不癢堅硬如岩必數年始潰潰後難愈始覺即用活壁蟢以針扦住乘活用竹紙包作小球食後白湯下日一服不過數日患處即癢如蟢行之狀堅塊自消初起以蔥白寸許嵌入梅花點舌丹一粒另用旋覆花三錢煎湯和醇酒少許吞下日服一粒不旬而愈拓盤疽溏雞屎塗穿掌心毒新霜葉研爛塗忌食鵝鵝掌風銀杏仁豬𦚟共杵爛敷手背腫絲瓜葉或芙蓉葉蜜拌蒸搗敷天蛇頭荔枝肉同脂麻嚼塗蒲公英蒼耳草各五錢醋煮頻洗陳柿餅一個雄黃末一錢搗爛敷代指烏梅肉醋浸研塗手指瘭疽初生如麻漸如桃李腫痛出血見骨發狂南星半夏白芷共研菜油調搽指甲根潰爛松香黃蠟化煬作筒套七日愈赤蛇纏腰間發如紅繩一條者是俗名纏身龍大麥炒焦研菜油和敷陳墨磨濃和雄黃末敷舊糞桶箍煅存性研菜油調敷大小腸癰大腸癰右足縮小腸癰左足縮地榆一斤水十碗煎至三碗入生甘草二兩金銀花一兩煎至一碗空心一服即消雖久亦不須兩服但忌房事余無所禁按辛熱炙敷亦不可食冬瓜子土貝母各二兩甘草一兩五錢黃耆栝蔞枳殼殭蠶制肥皂炒各一兩炙甲片五錢牛黃三錢乳香炙七錢十一味為末水法丸如緑豆大每二錢開水下專治大小腸癰二便下膿名滌腸丸兼治肺肝腎諸內癰老馬蘭頭煮熟飽啖可治諸內癰魚口瓦松焙乾雞子清和塗五倍子以陳醋於瓦器內熬成膏攤布貼之干即易數次愈便毒魚膠麩炒成珠研末空心好酒下外以芭蕉根米醋磨塗或蔥白杵爛蜜和敷立消按二證俗雖兩名其實治法不殊毋庸拘泥雄黃乳香各二錢黃柏一錢共研新汲水和塗囊癰鳳凰衣黃連輕粉等分研熟麻油和敷已潰者用黃連青黛等分研摻莖癰炙鱉甲研末雞子清和塗妒精淫瘡銀杏仁七枚鉛粉二錢拌勻入銅杓內炒深黃色除去銀杏仁以鉛粉去火氣研敷舊綢包扎下疳軟兒茶研細米泔洗淨敷甘草三兩老蔥三株黑大豆一合槐枝一把水三升煮豆熟為度濾清汁乘熱淋洗如冷再熱再淋洗一二時名甘豆湯蜜陀僧別研去渣砂鍋內火炮白礬各五錢白堊二錢黃丹淘乳香各五分麝香二分半共研先用蔥白甘草槐枝煎湯淋洗一二時拭乾摻之名博金散兒茶錢半珍珠五分乳香沒藥各二分冰片一分絲線燒存性七分共研先洗如上法摻此藥須如錢厚以紙裹縛俟結痂而已如出水再洗摻名丁泥散六一散一錢橄欖核煅炭五錢冰片一分三味研勻麻油調塗名冰六散痔瘡朴硝五錢開水沖熏洗臘月取羊膽一枚入冰片一分陰乾用時以涼水化開塗之蠶繭內裝滿人指甲外以胎髮纏裹煅存性研蜜和敷大棗三枚割開去核入銅緑合住外以淨黃土和泥包好煅紅取起去土研麻油調敷朝東楊樹上菌煎湯頻洗唾調木鱉子末塗之若以醋磨搽能治一切癰疽蝟皮四兩豬懸蹄二十五隻牛角腮三兩亂髮敗棕各二兩槐角一兩五錢苦楝根一兩二錢雷丸脂麻各一兩銼碎瓷器內煅存性為末入乳香去油五錢麝香二錢和勻酒糊丸先嚼胡桃肉一枚溫酒送三五十丸空心食前服三服除根名黑玉丹兼治肛門蟲癢犀角尖川連白礬各二錢三味研細用龍眼肉四兩杵丸如桐子大每一錢開水下名龍犀丸痔漏大松樹皮老者愈佳八兩濃煎一大碗收至一小碗乘熱服二次即愈兼治脫肛象牙屑二斤研細每晨以熟雞子二個蘸食或調入粥內吃亦可服完必愈田雞皮炙炭血餘煅存性黃明廣膠蠣粉拌炒等分研末每早服二錢管自消化夏枯草八錢甘草節連翹殼各四錢共研以金銀花一斤煎濃汁丸梧子大侵晨淡鹽湯下三錢年久者一料化盡當歸酒洗川連酒洗象牙屑各五錢淨槐花小川芎酒洗乳香去油各三錢露蜂房一個微火炒共研以黃蠟二兩熔化入藥丸梧子大每五六十丸空心煎漏蘆湯下至五日漏孔內退出肉管待二三指長用剪剪去再出再剪肉管盡出然後從內生肌而愈蜂房以槐樹上者佳椒樹次之不拘遠年近日膿血通腸者用坎氣三條即男子臍帶瓦上焙存性陳棕年久者佳煅存性槐角子肥大者瓦上焙存性各五錢象皮四錢醋炙蝟皮醋炙地榆曬乾各三錢西牛黃三分共研細酥油丸蠶子大若難丸加糯米糊少許每七丸空心開水下三日化管止痛七日平滿血清膿淨十日除根黃耆槐米炒各五兩西洋參蒸透胡連苦參蜜炙地榆各一兩炙草二兩蜣螂去翅足炒六錢象牙屑酒炒石決明煅各五錢十味研細用甘草四兩煎湯泛丸緑豆大每二三錢空心開水下專治肛癰痔漏臟毒日久成管膿水淋漓時發時止之證人指甲炙炭二錢蜒蝣炙炭一兩甘石制五錢雞內金炙蜣螂炙白螺殼各三錢甘草殭蠶炙蜂房炙冰片各一錢西牛黃五分十一味研細麻油調以綿紙合油線蘸藥打瘡孔內用象皮膏蓋一日二換專治肛門諸漏膿水不止口光眼細乍潰乍斂等證沉香五錢伽南香母丁香真珠各一錢四味研細用鴉片煙膏一錢杵丸如黍米大每五七丸開水下治痔漏甚良名鴉珠丸坐板瘡緑礬一把開水沖浸洗俟癢定坐草上待乾數次愈紫背浮萍芙蓉葉均可煎洗臁瘡水龍骨研桐油調敷柿葉燒存性同川椒研敷老母豬屎燒灰桐油和塗鮮蘆蔔陰乾一二日其皮可剝以皮貼上俟干再用牛蹄甲燒炭菜油和搽蒜杆槐炭菜油調塗此治寒濕證甚效熱勝者不宜棉花子一碗炒脆為末先將患處洗淨以藥填滿瘡孔油紙包緊三日一換二次即愈先以甘草湯洗淨拭乾用畫家石青水漂淨三錢加麝香二分再研極細敷之包過夜即收水生肌梨葉百片鮮豬油二兩拌葉上入鍋炒熱再以白蠟二兩研拌葉上又用鹽二兩亦拌葉上勿令葉熟爛取起待冷貼之若治女人裙邊瘡尤妙川椒一兩另研末篩淨松香八兩以米醋蔥汁煮透黃丹二兩枯礬二兩五錢輕粉七錢五分共研先以豬油湯洗淨菜油調塗或乾摻兼治黃水瘡亦名玉紅膏黃芽蔥二十六莖麻油二十四兩先將麻油熬熟入蔥莖煎枯取出再入一莖如法煎完三十六莖濾清再煎至滴水成珠入炒杭粉十二兩收膏去火氣攤貼真菜油四兩入連須蔥白三枚川椒十四粒熬枯去渣入黃蠟白蠟各二錢熔化離火俟沸定入東丹三錢急攪勻倒在碗內於陰地上去火毒一日夜用時先以生礬五六分滾水泡一碗將瘡洗干潔塗藥如錢厚油紙蓋之外加揉軟粗紙添蓋好束以絹帛每日一洗一塗縛扎如法數日必愈但瘡雖愈四邊必多水疱極癢切勿爬搔若搔破必又成瘡故雖愈仍將藥照舊洗塗並水疱要塗在內如是三五日全愈不癢矣名二蠟膏豬板油去膜蔥白各一兩潮腦五錢共杵爛先用防風甘草金銀花煎湯淋洗患處拭乾後厚敷之薄油紙裹好加棉花扎緊每日二換勿見風忌發物數日即愈兼治杖瘡及跌打皮肉損傷年久不愈者用乳香沒藥象皮各五錢鉛粉蜜陀僧各二兩輕粉四兩俱研細各自包開先用真桐油一斤滾透去沫澄清先入蜜陀僧末攪勻取起復入黃蠟二兩白蠟五錢熔化候油稍溫再入餘五味攪三百餘遍瓦器收之用時量瘡大小圓長以綿紙攤貼初貼時瘡中毒水流出藥變黑色再換新者貼之名白玉膏白柏油四錢黃蠟菜油各八錢大楓子去殼研五錢番木鱉二錢黃連黃柏各三錢同煎去渣再研入枯礬輕粉各三錢蜜陀僧另研五分拌勻候凝隨瘡口大小先以濃茶洗淨做薄餅簪刺十數小孔貼之包束如法日易名長肌膏兼治年久諸爛瘡制甘石四兩甘草膽礬各六錢輕粉五錢冰片麝香各四分六味為細末治新久臁瘡血風瘡以及抓傷不愈釘鞋草履打傷等證麻油調塗或乾摻之黃蠟二兩生礬銅青各一兩研菜油五兩煎沸入蠟化煬離火漸入二末攪勻作夾紙膏治臁瘡甚效若有腐以枯礬六錢樟腦四錢研末摻上後用膏蓋平薄二日一換熱甚者加摻熟石膏末更良銅青二錢黃丹白蠟各一錢樟腦八分冰片五釐五味研末用生豬油搗作膏夾紙貼臁瘡大妙巴豆杵萆麻仁各十二兩蝦蟆五隻各衝入發一團三味用麻油五斤浸三日再取活鯽魚十尾入油內同煎至枯去渣熬至滴水成珠待溫收入鉛丹四十兩攪入乳香末五錢成膏夾油紙針孔攤貼臁瘡久不合口一日一換貼時先以臭梧桐煎濃湯洗淨患處此方最奇用之極效沿皮蛀蜜陀僧樟腦等分二味研末麻油調塗白煤枯礬黃丹煙膏等分四味研末桐油和敷腳背瘡舊草鞋去泥燒灰敷乾者菜油和塗治爛至脛者多年屋上舊瓦刮取瓦屑研細菜油調搽腳背腫塊疼痛舊麥稈涼帽水煎頻洗鹽滷頻洗即愈或冷或熱酌宜而用兼治諸腳疾若無病男婦終身用之則一生無腳患腳跟擦傷或膝腿磕破久爛野雞腳雌雄成對者瓦上煅研細末瓷瓶收之敷上即痂腳䏖腳底紅腫也大蒜杵爛敷一宿即消癢極者醋浸枇杷葉貼敷溺缸中頻浸之最良按鹽滷亦可浸也腳蛀鉛粉白螺殼各八錢雄黃五錢象皮酒炙輕粉制松香制各二錢甘石制四錢膽蘖二錢冰片二分九味為末摻爐甘石六錢象皮龍骨各三錢冰片一錢輕粉三分升藥底少許共研細摻烏柏葉貼之凍瘃立冬日用蒜杆煎濃湯浸洗每年用之永無此患並不畏冷患於手者亦可預洗以杜絶也太和張遜侯司馬敷腳上冷疔初起紫疱疼痛徹骨漸腐爛深孔紫黑血水腫穢日久不愈黑鉛四兩以鐵杓熔化傾水內再熔再傾如此百遍以鉛盡為度去水取澄下者三錢松脂一錢黃丹水飛炒輕粉各五分麝香一分共研先用蔥湯洗淨患處以麻油和塗瘡口油紙蓋之腳丫臭瘡黃蠟一錢熟雞子黃一枚同熬油搽兼治寒濕瘡雞眼肉刺枯礬黃丹朴硝等分為末搽次日濯之數次即愈萆麻仁研極細末搽之二三時刺出痛立止傷科第十六跌打損傷小麥葉蘆蔔葉青松毛各一大把共搗爛遍貼傷處以被緊裹儘量飲醉睡醒即平冬瓜子研末溫酒下三錢日二豆腐切指厚鍋內炙熱貼之冷即易數次青腫即消桂枝靈仙各五錢當歸木瓜各三錢荊芥紅花防風續斷各二錢五分烏藥木香各二錢十味以酒煎洗患處干冬瓜皮真牛皮膠各一兩銼入鍋內炒存性研每五錢酒下再飲酒至醉厚蓋取微汗一寤而愈名二皮散白蠟一兩藤黃二錢麻油熔化塗即止血定痛輕粉血竭各三錢樟腦二錢乳香去油沒藥去油各一錢五分冰片三分麝香二分共研細以黃蠟一兩豬板油一兩二錢熔化調成膏塗患處晝夜流水凡重證昏迷不醒及死血鬱結厄逆不食兼治夾傷內爛皆可起死回生蘇木白麻皮細木耳各二錢均於瓦上焙焦木耳更要焦研末黃酒同赤糖和服醉臥避風昏迷即醒煨熟雞子黃一個麻油八兩共煎化盡再入頭髮三錢翦一寸長以筋順調化盡改用文火再入硃砂水飛雄黃各一錢黃蠟六錢攪勻掇鍋在地放一夜收起用時以翎毛塗患處名硃砂膏兼治湯火傷血流不止用黃蠟或白蠟研細敷或以飛面敷包勿見風或飛面和薑汁罨之或蓮房燒存性研敷麻油五兩白蠟六錢黃蠟五錢同化煬離火入藤黃末三錢攪勻冷定下冰片一錢再攪勻任用名西域黃靈膏兼治金刃傷及癰疽疔毒臁瘡血風瘡如治杖夾傷加銀硃末一錢五分青魚膽五分白附子十二兩天麻白芷羌活防風生南星各一兩各曬燥研細共研勻青腫者水調敷破處則摻之凡跌墜毆壓馬踢刀箭諸傷雖腎子壓出可治立能止血止痛重證黃酒調服數錢兼治破傷風故用此藥者並不忌風真傷科第一個效方價廉功大地方官須預配合如遇鬥毆傷重可以保全兩命家居亦宜備之可應急需氣絶不能言者以韭汁和童便灌一錢或以白蠟三錢研末好酒調灌即蘇隨用脂麻稈陳年黃麻毛竹根俱燒存性研沙糖調酒儘量飲被蓋出汗即痛止而愈凡跌打損傷而腦子偏者不能活其證頭暈嘔吐立不直亟將病人頭扶起立直用細帶一條圈頭看偏在或左或右何邊大即偏在何邊扶直人身以余帶約三四尺長繫於柱上用細棍敲帶之中一時即正而愈此蒙古所傳即時救急良方也按偏左似宜敲右偏右似宜敲左方內未注明用者須知汪謝城曰敲帶之中謂余帶三四尺之中也既云何邊大即偏在何邊則必偏左敲右偏右敲左不待更言矣當歸紅花桃仁續斷杜仲各五錢羌活獨活秦艽各三錢食鹽二兩牛骨髓三兩羊骨髓亦可用奶酥油二兩五錢好酒一斤水煎濃汁如在下部加牛膝三錢濾渣再入乳香沒藥各三錢臨用加麝香一錢和勻以新布三塊長二尺同煮熱將布絞乾於痛處更換拓並以手揉之凡跌撲閃挫筋縮骨出臼不入及一切風濕痛強並小兒龜胸鱉背初起亦可治也糯米一升皂角半升切碎銅錢百枚同炒焦黑去錢研末酒調塗貼治筋斷骨折大蟹一隻無大者用小蟹數只杵爛熱酒沖服醉臥一宵即愈或用蟹蓋殼新瓦上煅存性研每一錢黃酒下以醉為度並能接骨絲瓜開花時早晨帶露摘取不老不嫩肥厚之葉陰乾為末治跌打損傷及金瘡惡瘡惡癤摻敷皆妙人中白醋淬為末每五分酒下治閃挫跌僕傷骨極重者大效白芨末二錢酒調下治折骨效仙桃草四月間生麥田中葉緑莖紅實大如椒形如桃中有一小蟲者即是宜小暑節前夏至後取之蓋夏至前蟲未生小暑後蟲飛去惟此半月之間趁未坼採之烘乾研末藏瓷瓶內專治一切跌打損傷服一二錢可起死回生兼治三瘧久延不愈以紅棗同酒煎服亦效閃挫疼痛橘核一歲一粒研末酒服山楂末木耳炭各三錢研酒下木香一錢麝香三分研細左患吹右鼻右患吹左鼻以手上下和之痛至不能俯仰屈伸者用牙硝雄黃麝香各半釐研細以少許點入口內令人扶患者周圍行數轉其病如失未效再點疼止為度諸藥不效延久未愈者蔥白杵爛炒熱擦痛處隨用生大黃末薑汁調塗能飲酒者儘量一醉睡醒霍然金刃諸傷急以自己小便淋傷處傷重者旁人即以溺淋之或將傷處浸溺盆中口渴切勿飲水但食肥潤之物為宜若啜熱粥血必沸出慎勿犯之外以花乳石研敷蔥白炒熱罨之冷即易或蔥白沙糖等分研封愈後無痕苧葉研末摻宜端午夏至日各採等分曬乾俟霜降日研末備用何首烏白芍藥皆可研敷並能止血定痛柿餅杵爛塗血止口合晚蠶蛾歸頭白芷陳石灰等分研末敷之止血定痛生肌一上即愈紅桴炭研細乘熱敷並可接指黃荊腦搗爛敷一日一易雖臭爛者五日即收口生糯米於清明前一日一換水浸至穀雨日曬乾研凡金瘡久爛者敷之劉寄奴當歸生地熟地合歡皮男子黑髮洗淨各一兩麻油四兩煎至發化去渣入黃蠟白蠟各八兩不住手攪離火仍攪至溫入乳香沒藥血竭各三錢研龍骨童便煅一錢研慢慢投之攪勻候冷瓷器收藏兼治杖瘡塗敷皆妙以帛包裹不可見風此戚少保保志膏也破傷風蓮房燒存性研細敷再以酒調服杏仁泥飛面等分水調成膏塗腫處即消腫退熱手足十指甲麻油炒黃研細黃酒沖服汗出即愈人咬龜板鱉甲等分煅存性研菜油調敷蛇狗咬真雄精火硝漂各一兩當門子三錢冰片一錢先將雄精研細篩淨再研四五十天余藥亦須研極細至五月五日午時焚香齋戒沐浴一人修合不與四眼見更忌婦人以上四味和勻研至無聲為度凡毒蛇猘犬咬者男左女右以竹挖耳點藥於大眼角內一日一二次不可多蛇傷者患處不必另用別藥任其流出毒水止用淘米泔水洗之或乾燥用自己唾涎塗之忌食赤豆百日最為至要猘犬傷者忌食羊肉發物傷處亦不必用藥但以糯米飲洗之點此丹俟小溲內有絲解出即無妨矣此丹合成盛瓶內以蠟封固勿使泄氣可以立刻止痛名追毒丹亦治痧證悶死時疫發斑不出並可點之按蕭山韓氏方火硝止三分冰麝雄精各一錢更有九制爐甘石一錢名五聖丹治同蜈蚣咬向花枝下泥上書田字勿令人見取其泥擦患處蜈蚣入腹痛不可忍急以雞子清數枚灌之良久痛稍定隨用生油與咽其蜈蚣即與雞子纏束而吐出也此前明吳縣張汁虛先生方祛蟲害物第十七祛蜈蚣頭髮燒煙燻凡廚房床下尤宜祛之祛蚊鱉甲打碎土炒芫花苦參藜蘆川烏共研棗肉杵丸胡桃大每晚焚之祛臭蟲螺殼燒煙燻青鹽煎水澆洗床帳祛鼠椿樹葉冬青絲瓜根葉並曬乾四季燒煙熏於室中勝於畜貓以戕物命也馬病白鳳仙花連根葉熬膏不論何證抹其眼四角即汗出愈牛瘟枇杷葉十餘張去毛韭菜青木香銀花根各一錢煎湯灌下立效忌生水豬牛時病朴硝青礬雄黃各五分冰片二分麝香一分共研竹管吹其鼻內兼治貓犬病
