砂冰片麝香各二錢四味研細攪勻凡諸痞攻動作痛腹脹如鼓攤貼之痰酒食積烏梅肉生薑各四兩白礬半夏各二兩搗勻以新瓦夾炭火焙三日夜神麯麥芽青皮陳皮蓬莪丁香皮大腹子各一兩共研細酒糊丸薑湯下三五十丸名烏白丸嗜藥成積胡桃殼隔炙存性生棐肉等分研每二錢沙糖湯下三月朔服起旬日可愈瘧痞胡桃殼隔煅存性三兩木香八錢共研細每二三錢好酒下三五服愈名香桃散血症豶豬肝十兩以巴豆五十粒去皮扎肝內醋三碗煮肝極爛去巴豆入荊三稜末杵和丸緑豆大每五丸食前酒下秦艽三稜蓬莪黃柏當歸各五錢大黃三錢全蠍十四個穿山甲十四片蜈蚣五條木鱉子七個共入菜油二斤四兩內浸兩日夜煎黃色去渣熬略冷入炒紫黃丹一斤二兩不住手攪黑煙起滴水不散離火下阿魏一兩乳香沒藥各五錢風化硝三錢琥珀末一錢收之拔去火氣臨貼加麝香少許兼治馬刀瘰癧朝天結成石榴一枚無些微損傷者連枚蒂摘下用新砂鍋一隻新木杓一柄米醋十斤愈陳愈佳陸續入鍋煮榴極透將杓底擦滾石榴令其皮爛俟醋完熬至色黑如膠榴渣盡化作膏起鍋瓷瓶收盛試以豬血或羊血凝塊者置碗中以金銀簪挑榴膏一塊滴於血上即透至血底俱化為水足驗藥力每一二錢開水化服去瘀化積而不傷新故足珍也腫脹疸瘧第八水鼓白茅根赤小豆煮汁頻飲溺暢腫消輕粉二錢巴豆四錢生硫黃一錢研勻成餅先用新綿鋪臍上次鋪藥餅外以帛緊束之約人行五七里許自然瀉下惡水待下三五次即去藥以溫粥補之一餅可治一二十人久患者隔日取水烏牛溺一升微火煎如飴空心服棗許當鳴轉病出隔日再服之雄豬肚一具洗淨入蟾蜍一隻胡椒按病人年紀每歲一粒砂仁二錢以酒煮爛去蟾蜍胡椒但徐徐服完酒肚其腫自消西瓜一個切去蓋以大蒜按病人之年每歲一囊插入瓜內仍將瓜蓋好用竹釘扦牢入甕內以粳火四面圍煨一晝夜取出去瓜但食蒜即愈愈後食淡百日不再發顧雨田傳腹大有聲而皮黑者用山豆根末酒服二錢諸藥不效延久欲死者豬獾肉作羹啖蛤殼粉煅一錢五分厚朴檳榔各一錢桑皮大戟葶藶陳香櫞陳皮胡蘆防己沉香各五分黑醜四分麻黃芫花甘遂各三分十五味為末用朴硝化水丸黍米大每服十丸重證加至二十丸小兒服八丸為止以冬瓜皮赤小豆煎湯送下汪曰赤小豆乃赤豆之小種俗以相思子半紅半黑者為赤小豆大誤余故改稱小粒赤豆以免矇混治鼓脹腹大臍凸青筋遍繞氣逆如喘之危證汪謝城曰白茯苓二兩土炒白朮一兩小粒赤豆一兩大麥芒五錢無則以麥糵代之大罐煎之須一晝夜盡一劑三日連服三劑治水腫如神如分兩減輕或兩日服一劑即不效或少加枳實神麯車前草等亦可氣鼓白楊東枝去粗皮避風細銼五升炒黃以酒一斗淋之渣盛絹袋還浸酒中密封再宿每飲一合日二合五穀蟲洗淨炒黃色研黃米飯杵丸緑豆大開水服三錢日二服此方兼治疳膨黃瘦蘆蔔一枚周圍鑽七孔納巴豆七粒入土種之待其結子取以再種待蘆蔔成仍鑽七孔納巴豆七粒再種如此三次至第四次開花時連根拔起陰乾待用每一枚槌碎煎湯服重者再服必愈黃疸清米泔頻飲頭番莧菜系經割過者陰乾遇病以砂鍋煎湯大碗頻服按冬月淡風蘆蔔葉亦可用生南瓜蒂研爛絹包塞鼻孔男左女右又用布圍病人兩肩待黃水流盡即愈或以干蒂炙存性研末搐鼻亦可陸定圃曰袁州楊蕉隱云黃疸諸藥不效者以活卿魚數尾剪其尾貼臍之四圍當臍勿貼須臾黃水自臍出魚尾當漸干更剪貼之以愈為度汪謝城曰青殼鴨蛋上敲一孔入朴硝數粒宜多不宜少飯鍋上連殼蒸熟去殼日食一二枚輕者十日重者一月必愈雖黃疸入腹將成膨脹亦可治或疑藥猛不敢服或服數枚即止不知藥不瞑眩厥疾不瘳俗所謂有病則病當之也余體素虛患黃疸入腹諸法不效因服至四十餘枚始愈此實治疸第一神方癡仙按此攻補兼施之法並非猛劑雖疳膨鼓脹亦可取效願體集有牛肉朴硝治鼓脹法撫剿兼施皆為正虛邪錮者設也酒疸萱花根白茅根等分煎服黑疸鮮栝蔞根搗汁飲黃病飛面一斤皂礬八兩和作餅火上煨焦蒼朮泔浸厚朴去皮薑汁炒陳皮甘草各六兩川椒去閉及目十兩共研末用大棗三斤去皮核煮熟胡桃三斤同杵成膏丸梧子大每七八十丸酒下初服覺香病愈則聞臭矣瘧蓽茇一粒研細置暖臍膏上貼臍中治寒瘧甚效野云曰瘧因於寒者特其一端耳世俗不知治瘧多用溫熱之劑以致綿延難已非餘邪留戀或飲食失調或傳布單方試輒罕效惟邪盡正虛者可以溫補收功否則纍月經年仍宜按證設法也顛狂癇厥疫第九久顛活壁虎一隻剪去四足細研冰片麝香硃砂各少許共研勻先用礞石滾痰丸下其痰涎次用薄荷湯調此作一服下名活虎丹狂雄黃硃砂各一錢五分白附子一錢共研細豬心血丸緑豆大另以硃砂為衣每五丸或七丸或九丸人參菖蒲湯下無參用黃耆亦可名雄朱丹甘遂末一錢豬心血和勻將豬心挑開入藥於內線扎緊皮紙濕包煨熟取藥出入硃砂末一錢研勻分作四丸每一丸以所煨豬心煎湯下如大便下惡物即止後藥不下再服一丸名甘遂丸按此方治痰迷心竅實證挾虛者宜前方細茶葉紅者勿用亦勿太陳白礬各三錢研勻飯杵丸梧子大飛硃砂一錢為衣每三錢竹瀝或梨汁或蘆蔔汁送下汪謝城曰白龜殼屑治狂神效余嘗親見之惜白龜難得耳如留心訪求未必不可得也癲癇皂角二兩打碎用水半碗浸透採汁去渣加白礬二兩煎乾白附子五錢半夏南星烏蛇全蠍各三兩蜈蚣半條殭蠶一兩五錢硃砂雄黃各一錢五分麝香三分各研和勻薑汁糊丸緑豆大每三十丸白湯下諸癇人參茯苓麥冬犀角硃砂各二兩牙硝地骨皮桑皮甘草各一兩冰片牛黃麝香各三錢飛金二十頁為衣研細蜜丸芡子大蠟匱每一丸白湯下日三丸名安神丸按此方治虛證前方治實證檢方者須量體裁衣也痰湧氣逆不省人事手足厥冷者亦實證也用苦參細茶各二十兩鬱金白礬各八兩廣木香薄荷各四兩共研細末橄欖二斤打爛絞取汁丸如桐子大略以硃砂為衣每五錢分早晚開水下遠志茯神當歸象牙屑膽星橘紅苦參白芍各二兩元明粉明礬生軍川芎法制半夏石菖蒲青黛各一兩杏仁霜一兩二錢沉香五錢川連三錢十八味為細末以連血豬心一枚入飛辰砂五錢煮爛再以橄欖三斤打汁熬膏皆打入藥內為丸如干加白蜜每丸重一錢每一丸燈心湯化服象牙屑天竹黃遠志生大黃膽星各三錢犀角川貝龍齒煅安息香鬱金乳香石菖蒲製半夏礞石煅各二錢飛辰砂川連琥珀各一錢麝香五分冰片二分青黛一錢五分二十味研細用橄欖膏加煉蜜杵丸黍米大牛黃為衣每服錢許竹葉湯送服飛辰砂白芍酒炒川芎遠志當歸杏仁去油生地茯神元明粉石菖蒲川貝母膽星各五錢川連橘紅青黛各三錢牛黃五分十六味研末以豬心一個煮爛加蒸餅糊丸如黍米大食後燈心湯送服二錢或加皂莢炭婁仁霜製半夏作大丸亦可皂礬煨紅魚鰾麵炒鉛粉炒黃各一兩辰砂飛三錢四味為末每數分空心酒調下皂角取干圓肥好不蛀者去皮弦子捶碎以清淨酸漿水一碗春秋浸五日夏浸二日冬浸七日搓揉去渣澄用瓷器文武火熬成膏藥相似攤新夾紙上陰乾凡驚邪風癇心迷狂亂積熱痰涎上衝及破傷風搐牙關不開等證無問遠年近日但取此膏掌大一片以溫漿水化於瓷碗內將病人扶坐用竹管或帶筒裝藥水吹入左右鼻孔內扶定良久涎出即愈名來蘇膏痰厥明礬一兩黃丹五錢共研每取末一匙入瓷器內熔化乘熱丸櫻桃大薄荷湯下一丸名鶴頂丹尸厥犀角五錢硃砂麝香各二錢五分各研和勻每二錢新汲水調灌名米犀散硃砂雄黃玳瑁麝香白芥子等分各研細安息香熔化為丸黍米大每服五分名返魂丹虎頸骨二兩硃砂雄黃鬼臼蕪荑藜蘆鬼箭羽雌黃各一兩共研蜜丸彈子大絳紗囊一丸男左女右係臂上並於病室內焚之兼治尸疰鬼交疫癘名辟邪丹凡暴厥卒中癇魘及跌墜暈僕諸病其身中氣血擾亂未定切勿張皇喧鬨妄為移動以致氣絶不返總宜在原處量證設法可以得生如閉證宜取嚏服玉樞丹蘇合丸之類以開之虛證用炭醋熏之或令人系挽以口接氣再灌以參湯薑湯童便之類按證施治候其蘇醒然後移歸臥室可也世俗不知往往扶掖他徙多致不救總由不知古法贅此以冀仁心為質者傳播於世也闢疫羚羊角一角雄黃白礬鬼箭羽各七錢五分為粗末三角絳囊盛一兩帶心前並挂戶上或以青布裹少許中庭燒之亦治尸厥名流金散紅棗一斤茵陳切四兩大黃銼八兩合一處焚之如加麝香燒更妙雄精以水磨濃鹽洗後及臨臥時塗鼻孔內中毒第十闢蠱大荸薺切片曬乾為末每晨空心白湯下二錢入蠱家不能為害客遊宜備或袖中常帶當歸亦妙煙毒沙糖調水服青蔗漿恣服以下鴉片毒生南瓜搗汁服一味甘草膏涼開水化服煤毒一時暈倒清水灌之生蘆蔔汁灌之悶香床頭置清水一盆臨臥時啖棗一二枚或含口中飛絲紫蘇葉嚼之銀黝帶皮緑柿連啖數十枚冬春多食柿餅亦可鉛粉服地漿一碗海蜇漂淡荸薺切同煮服硇砂生緑豆煎清湯冷飲二三碗並治諸藥毒燒酒毒硫黃黑鉛煎湯服砒霜上白糖霜靛花甘草淡豆豉等分研勻冷水調灌雖閉口垂危可活並治鉛粉毒藤黃多食海蜇自愈頭面七竅病第十一卒然頭痛白殭蠶去絲研末二錢白湯下頭痛欲死焰硝研末吹鼻中白芷炒研將米粉蒸熟和末乘熱貼患處包頭扎緊次日必愈甚者三貼必愈川芎羌活各一兩薄荷甘草各二兩殭蠶每歲一條煎湯熏洗日三次重者三日必愈忌見風頭風地龍去土焙乳香等分末之每二分半作紙燃燈上燒煙燻之名龍香散全蠍二十一隻地龍六條土狗二個五倍子五錢共研酒調貼太陽穴名蠍龍膏北細辛二莖瓜蒂七個丁香三粒糯米七粒研細入冰片麝香各分半研勻每用豆許隨病左右搐鼻中良久出涎愈名透頂散陳艾一團如胡桃大生半夏研細末少許以綿料紙一方將艾鋪紙上半夏末灑艾上卷如小指粗左痛塞右鼻右痛塞左鼻一宿以流出清涕為度重者二次必愈斑蝥一個去頭翅足隔紙研細篩去衣殼取末少許點膏藥上左痛貼右太陽穴右痛貼左太陽穴輕者足三時取下重者足六時取下永不再發久貼恐起疱也正痛者以手撳頭上何處最痛用筆圈地用斑蝥末放患處蓋以小蜆殼一枚用帕扎緊過一宿起小疱刺出黃水其病如失白胡椒官桂吳萸各一錢白芷二錢共研末摻膏藥上貼患處頭旋腦暈清明取松花並藁五六寸形如黃鼠尾者切蒸六兩以絹袋盛浸陳酒六斤隔湯蒸逾五日頻飲頭目不清花粉荸薺粉各一兩人乳粉真珠粉飛辰砂人參西洋參可代玫瑰花檀香木香降香伽南香安息香以上二香如無可用山奈一錢代之沉香琥珀各二錢薄荷西牛黃生大黃蓬砂丁香各一錢破故紙六分甘松五分麝香三分冰片四分甘草八分煨石膏量用合色共研極細粉瓷瓶或銀瓶裝儲以蠟封固勿使泄氣每日嗅鼻二次大清頭目闢穢驅風除邪醒酒益人神氣並治頭疼頭暈真妙藥也若加龍涎香二錢更妙腦風不可忍遠志肉二錢為末吹鼻內面上雀斑粉刺酒滯皂角一斤升麻二兩六錢五分楮實一兩六錢五分白芷白芨花粉緑豆粉各三錢三分半甘松砂仁白丁香各一錢六分半樟腦二錢糯米三合半共研細令勻常於洗面時擦之抓傷麵皮生薑自然汁調輕粉塗無痕目昏陳海蜇漂淡一斤入砂瓶煮化成糊再入黑大豆一升煮乾曬燥收藏每日食之老眼常明目障冬至日取大蘆蔔一枚開蓋摟空入新生頭窠紫殼雞卵一個在內蓋即嵌好埋淨土中約深四五尺到夏至日取出用女人衵衣包裹藏瓷瓶內否則防遇雷電龍即取去也謹之卵內黃白俱成清水名賽空青乃神方也點睛消障瞽目重明膽礬三錢五分白菊花花椒各三錢銅緑青鹽各二錢五分烏梅一個去核新繡花針七枚以絲線穿好前藥六味研碎以清水拌勻盛入深碗內針放藥底再加水兩碗線頭露出碗沿以大盤蓋好隔水放鍋內蓋好煎六個時辰木炭火旺不失候鍋中時時添水針化丹成以淨絹擠出藥汁瓷瓶裝好放陰地上一日即可用久藏不壞每少許搽外眼眶內眼角少閉片時翳障即開而能視物矣但須誠心潔室靜制針化丹成始能有效如煎至六時而針不化者勿用須另制也名七針丹余見秀水呂君慎庵之高弟曹蟾客製成治人甚效雞膽一枚入白蜜半匙以線扎好入豬膽內挂通風無日處二十一日去豬膽先用人乳點患處忍之少頃以骨簪蘸雞膽點上遍身透涼淚流汗出二次即明忌茶百日採霜降後桑葉煎湯代之目翳冬青葉腦七個五倍子三錢杵煎湯一碗乘熱將舌尖拖出浸於湯內片時頻熱頻浸自愈辰砂一塊頻磨擦之翳痛雞肝一具不落水木芙蓉葉一錢龍膽草七分肉果霜五分共研末入肝內飯上蒸熟食之蔥一株將熟去頭取漿點之蠐螬汁滴目中並炙食之立效風毒上攻赤腫流淚羞明畏日澀痛難開翳障諸證野荸薺粉五錢制爐甘石一兩蕤仁霜三錢蓬砂一錢五分飛辰砂真珠各一錢冰片四分西黃三分共研極細無聲瓷瓶密儲臨臥以簪腳蘸唾沫沾藥點兩眼角名八寶保睛丹制甘石五錢飛珊瑚蓬砂川連各三分飛瑪瑙熊膽琥珀真珠各二分血竭飛辰砂各一分半炙乳香炙沒藥冰片各一分麝香五釐十四味共研極細無聲治證同前取效尤捷名聚寶光明丹不論遠近或癢或痛及胞生風粟翳膜遮睛目眶赤燥或疹痘後風眼澀痛膜障等證白蒺藜三兩石決明煅飛炙甘草防風梔炭羌活茯苓蔓荊子各二兩當歸川芎赤芍各一兩五錢蒼朮泔水浸一夜花粉甘菊茺蔚子各一兩淡黃芩八錢蟬衣蛇蛻各五錢十八味共研末每服二錢空心開水調服小兒減半名云開散拳毛倒睫木鱉一個去殼為末綿裹左患塞右鼻右患塞左鼻數夜自愈斑瘡入目生赤翳白障緑豆皮穀精草白甘菊等分為末每一錢用柿餅一枚米泔一錢煎乾不拘時啖柿餅七八次愈痘疹目澀昏睡或喘嗽蒲公英二兩煎服即愈眼傷青腫生半夏為末水調塗竹木刺入目白頸蚯蚓掐斷滴血入目刺即出雞盲鮮合歡皮兩許煎服以愈為度耳卒聾椒目巴豆仁石菖蒲松脂各五分為末以蠟熔化和勻作筒子樣綿包納耳中日二次名透耳筒全蠍一個土狗一個地龍二條雄黃五分生礬枯礬麝香各二分半研末以蔥白蘸藥入耳中閉口面壁坐一時一日三次名通神散由於跌僕損傷頭腦愈後耳聾者巴豆一粒不去油斑蝥三個麝香少許研勻以蔥涎蜂蜜和捻如麥粒形絲綿裹置耳中必響如雷鳴不必驚懼待二十一日耳中膿水流出去藥即聰名導氣通瘀錠耳卒鳴蠍梢七錢穿山甲一大片蛤粉同炒赤麝香少許為末麻油化蠟和耳膿黃柏豬膽汁炒紅花酒炒等分冰片共研吹白螺螄殼四錢柿葉炭煅龍骨石首魚頭中白石煅各三錢橄欖炭二錢燈心炭一錢冰片麝香各五分八味研末時吹耳內大北棗四枚劈開每嵌入豆大明礬一粒煅存性肉桂冰片輕粉麝香各一錢五味共研細儲頻吹極效汪謝城曰蛇蛻為末頻摻即愈愈後其藥末結成一塊滿塞耳孔以指撮出可也耳瘡屠肉几上垢敷之耳癢甘遂根杵汁滴之耳聤野豬腳爪切千年石灰杵以人糞拌勻用大蚌殼全個裝滿合好外以鐵絲扎緊黃泥封固於炭火上煅至青煙起置泥地上出火氣研細末瓷瓶祕藏凡耳爛流水各藥不效者敷之立效此耳科祕方也用治一切外證之潰爛不已者亦神效無比鼻衄火漆紫針汁染綿為胭脂渣名火漆研極細末時聞鼻中鼻淵漆綿漆鋪內絞漆用過者白鴿翅去硬管用兩邊之毛各一兩將鴿翅卷在綿內煅存性每一錢加冰片七釐研勻令病人仰臥輕輕吹入少許若吹稍重恐噴嚏打去藥也每夜吹一吹四五次愈戒房事百日鼻筍白礬蓬砂等分為末吹一化水而消明礬一兩白梅肉五錢麝香三分篦麻仁七粒共研爛綿包再用紙裹塞鼻男左女右口渴白糖霜烏梅肉薄荷葉柿霜蓬砂等分研細蜜丸噙之口臭前方加白檀香白豆蔻此二味分兩減半共研細以枇杷葉去毛煎濃汁和蜜丸櫻桃大臨臥含口中脫頦生南星末薑汁調塗兩耳前牙骨穴處牙疼龍骨生黃柏生黃芩各五錢生梔子仁三錢以後三味銅鍋內熬出汁去渣煮龍骨幹研末再用鉛粉五錢麝香三分並龍骨末研細粉放碗內加黃蠟一兩坐滾水內頓化拌勻以連四紙鋪火爐蓋上將藥刷在紙上剪為狹條名玉帶膏臥時貼痛處即愈次早取出有黑色可驗牙硝一錢明礬雄黃各三分冰片一分共研細以半分擦患處流涎自愈冰片生石膏各二分青黛一分共研末搽以上治火證川椒生石膏各一錢蓽茇二錢青鹽八分共研細點名椒石散馬牙硝蓬砂各三錢明雄黃二錢冰片一分半麝香五釐共研細收儲以少許抹患處瓜硝珠黃散一兩方見下卷咽喉方法紫雪一錢飛辰砂二錢杜蟾酥五分冰片三分共研細收儲凡風火牙痛諸藥不效者以此摻膏藥中貼痛處頰上立愈以上治風火證橄欖炙炭研末搽松脂烘軟塞鼻孔內蟲黏脂上梅樹上蠔蝥窠鹽泥包煅冰片麝香各四分牛黃二分紫雪二錢蟾酥丸二十粒共研細摻膏藥中貼之以上治蟲痛牙疳石菖蒲根磨涼水常漱浣牙宣元明粉研摻五倍子燒炭擦炒蒲黃研搽重舌木舌白直殭蠶為末吹之吐痰愈辰砂七錢雄黃一錢五分蓬砂三錢研末鮮薄荷汁調敷兼治發頤名朱黃散舌出不收巴豆仁一粒杵碎綿包塞鼻孔內舌咬傷出血不止黃麻皮燒存性研敷舌尖咬去蟹殼燒存性研極細摻漸長完全咽腫齦爛朴硝三錢蓬砂二錢硃砂一錢五分乳香沒藥皆去油各三分共研吹搽名小靈丹誤吞竹絲銀杏肉去衣生嚼十二枚咽汁自消錢卡咽喉生大蒜塞鼻中自然吐出如已下咽用麵筋置新瓦上煅作炭研細開水調溫服從大便下倘未下咽服此亦從口出也風痹腳氣轉筋鶴膝第十二風痹痛由風寒濕踞於經絡以致手足麻木屈伸不利筋骨疼痛畏風怕冷也魚膠四兩薑汁祕熬膏攤布貼老生薑鳳仙子川椒共搗拌菜油擦之汾酒放烈日下曬熬以手蘸摩患處旬日一作三五次愈三伏時尤效雖積年錮疾諸藥不應者可刈病根鳳仙子煎湯頻洗獨蒜汁韭汁艾汁薑汁蔥汁各四兩滴花燒酒二十兩同煎滾入麻油四兩熬至汁枯濾清用丹收成加入冰片乳香攤貼患處兼治箭風極效名捉虎膏五茄皮防己獨活木瓜炒川芎天麻酒炒秦艽淡附子桂枝防風各一兩黃耆當歸製半夏各二兩紅花二兩二錢生地酒炒四兩豨蘞酒蒸三兩甘草白芥子各六錢十八味為細末煉蜜打丸每重二錢空心酒化一丸服川烏故紙乾薑淡附子各一兩草烏官桂川椒樟腦香附杜仲木香乳香大茴南星防風川芎安息香半夏大黃桃仁當歸各五錢丁香藝香各四錢沉香檀香硫黃冰片甘松山奈雄黃沒藥艾葉羌活白芥子各三錢麝香二錢三十五味研細用蘇合油或丁香油或麻油拌勻打熱收藏用時先將手搓熱以藥摩患處俟皮膚香透將藥放開但以手按皮膚徐徐摩擦此藥一兩可用十餘次專治風寒濕邪踞於經絡凡筋骨疼痛四肢拘攣麻木腰膝畏寒等證皆病在軀殼服藥不能速效宜以此藥摩之最妙兼治男婦寒疝攻痛寒濕腹痛腸鳴陰寒霍亂轉筋及寒濕凝滯而結成腫毒者皆效按風寒濕三氣為痹俗呼風氣痛是也治法總以辛溫通逐為事但經熱則痿絡熱則痹是痹證亦有屬熱者且六氣都從火化若其人體質多火或素嗜膏粱總受風濕易於化熱臨證時必察其有無苔黃口渴小便短赤之兼證始可治如上法否則當從虛勞門清金養血丹之例矣痹證屬熱者陳海蜇漂淨四兩鳧茈即荸薺二兩劈開煎至蜇化為度頻服外以朴硝泡湯乘熱熏洗或鹽滷煎熱淋洗亦妙腳氣冬瓜皮三兩蔥一兩煎湯頻洗鮮魚骨炙研末菜油調塗鳳仙花葉根同紫蘇葉煎湯頻洗海桐皮防己片薑黃蠶砂各三錢蒼朮一錢煎湯熏洗日三四次朴硝煎濃汁湯淋洗日數次勿間斷可除根不發或每日以鹽滷煎熱淋洗亦妙一味黃柏酒炒焦研末蠶砂湯為丸緑豆大每晨後鹽湯服三錢久服自痊金銀花為末酒調服再用金銀花貓兒眼草露蜂房等分煎湯洗足衝心者可愈轉筋滴花燒酒一碗湯熱入斑蝥末攪勻乘熱尉患處並須數人更迭蘸酒於轉筋處拍之冷則更易直至小便通轉筋自止若僅用燒酒則力緩矣鶴膝無名異地骨皮各一錢麝香三分沒藥乳香各去油三錢共研以車前子打汁入黃酒和塗患處三日即痊名異香散前陰病第十三遺溺雄雞翅毛煅存性研酒調二分半服日三龍骨另研三兩透靈硃砂水飛過二兩訶子肉砂仁各一兩共研末糯米糊丸梧子大每三錢淡鹽湯下不禁麥稈穗三十個龍眼肉三十枚煎服遺精臥時以襪帶扣左曲膝頭須不緊不松永無夢遺赤白濁寒食插簷柳煎湯代茶琥珀三錢木通一錢萆薢象牙屑酒炒各三兩滑石飛四兩海金沙萹蓄各二兩槐米甘草梢黃柏鹽水炒瞿麥各一兩十一味研末每二錢淡竹葉湯調服治膀胱經熱毒火癃閉結痂發腫馬口腐爛之證粉萆薢荷葉蒂槐米黃柏鹽水炒各三兩海金砂二兩五錢象牙屑酒炒萹蓄各二兩滑石飛一兩五錢甘草梢赤苓各一兩十味為末用車前子五兩煎湯法丸梧子大每三錢土茯苓湯送下開水亦可治腎家經火敗精阻竅內熱溺艱結痂淋濁等證名通府保精丸溺血川黃柏二兩六錢木知母一兩四錢水破故紙二兩八錢火胡桃肉一兩二錢金砂仁五錢土共研蜜丸空心鹽湯下三五十丸名太極丸血淋芭蕉根旱蓮草車前子水煎服小水不通麻骨一兩濃煎服陰襲腎囊堅硬小水不通屬寒證胡椒二錢研末盛碗內以雞子清二枚調勻即將腎囊置碗中將碗捧住初未覺暖已而漸熱則堅痛漸消至熱不可耐然後去之愈不再發紫蘇艾葉各一兩防風五錢三味煎滾傾腳盆內四面圍緊熏之候溫洗之重者兩次可消吳萸半斤一分酒浸一分醋浸一分童便浸一分白湯浸並焙乾澤瀉二兩共研酒麵糊丸黍米大空心下三五十丸名奪命丹延胡川楝全蠍炙小茴等分末之名一捏金散此二方兼治奔豚寒疝疝橘核炒去衣為末每晨酒送一二錢初起服之不成錮疾陰囊扯落睪丸懸挂未斷痛苦難熬須慢慢拓上多取壁錢即蟢子窠敷貼傷處囊可如故後陰病第十四暴瀉不止車前子炒四五錢末之米飲下官桂厚朴等分為末薑汁丸如豆大安臍中膏藥封之久瀉五倍子五錢為末醋熬成膏布攤貼臍間寒瀉丁香四分肉桂二分二味研末打丸如豆大安臍內以膏藥貼之治陽虛氣弱腹痛腸鳴畏寒泄瀉之證脹瀉白朮炒八兩陳皮厚朴各四兩八錢枳殼一兩六錢炙甘草二兩四錢製半夏一兩二錢神麯炒焦木香各五錢八味為末每一二錢空心開水調下名調中散治脾弱胃滯泄瀉不飢腹滿痞積等證瀉痢土木鱉半個母丁香四粒麝香分半共研細唾津丸如芡子大以一丸安臍中封以膏藥凡小兒不能服藥者用外治法最妙赤白痢木香四兩苦參六兩酒炒共研以甘草一斤熬稀膏丸如梧子大每二三錢陳米湯下名香參丸糖霜細茶緑豆胡桃肉各三錢煎連湯並桃豆食之重者三服必愈生大黃